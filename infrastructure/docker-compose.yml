version: '3.8'

# ── Production Docker Compose ─────────────────────────────────────────────────
# Uses built images — no source volume mounts
# AI_PROVIDER=openai baked in — no Groq, no sentence-transformers
#
# Usage:
#   docker-compose -f infrastructure/docker-compose.yml up -d
#   docker-compose -f infrastructure/docker-compose.yml logs -f web

services:

  postgres:
    image: pgvector/pgvector:pg15
    container_name: ai_agent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiagent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiagent_password}
      POSTGRES_DB: ai_agent_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiagent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: ai_agent_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  web:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ai-agent-platform:latest
    container_name: ai_agent_web
    restart: unless-stopped
    env_file: ../.env
    environment:
      AI_PROVIDER: openai
      DATABASE_URL: postgresql://aiagent:${POSTGRES_PASSWORD:-aiagent_password}@postgres:5432/ai_agent_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    networks:
      - backend
      - frontend

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ai-agent-platform:latest
    container_name: ai_agent_worker
    restart: unless-stopped
    env_file: ../.env
    environment:
      AI_PROVIDER: openai
      DATABASE_URL: postgresql://aiagent:${POSTGRES_PASSWORD:-aiagent_password}@postgres:5432/ai_agent_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_config worker --loglevel=info
      -Q ai_processing,embeddings,crawler,governance,risk_assessment,hallucination,voice,analytics,cleanup,escalation
      --concurrency=4
    networks:
      - backend

  beat:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ai-agent-platform:latest
    container_name: ai_agent_beat
    restart: unless-stopped
    env_file: ../.env
    environment:
      AI_PROVIDER: openai
      DATABASE_URL: postgresql://aiagent:${POSTGRES_PASSWORD:-aiagent_password}@postgres:5432/ai_agent_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
    command: celery -A app.workers.celery_config beat --loglevel=info
    networks:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: ai_agent_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - web
    networks:
      - frontend

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  backend:
    name: ai_agent_backend
  frontend:
    name: ai_agent_frontend
